<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Demo</title>
    <link rel="stylesheet" href="./css/style.css">
</head>

<body>
    <div class="container">
        <button class="toggle-nav">
            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                stroke="#ADABAA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                class="icon icon-tabler icons-tabler-outline icon-tabler-menu-2">
                <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                <path d="M4 6l16 0" />
                <path d="M4 12l16 0" />
                <path d="M4 18l16 0" />
            </svg>
        </button>
        <div class="header">
            <button class="toggle-nav" id="toggle-close">
                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none"
                    stroke="#ADABAA" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"
                    class="icon icon-tabler icons-tabler-outline icon-tabler-x">
                    <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                    <path d="M18 6l-12 12" />
                    <path d="M6 6l12 12" />
                </svg>
            </button>
            <h1>HIGH-VELOCITY ATHLETICS</h1>
            <nav>
                <ul>
                    <li><a href="#">Home</a></li>
                    <li><a href="#">Programs</a></li>
                    <li><a href="#">About</a></li>
                    <li><a href="#">Contact</a></li>
                </ul>
            </nav>
            <div class="action-section">
                <button class="btn1">
                    <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="#ADABAA"
                        class="icon icon-tabler icons-tabler-filled icon-tabler-shopping-cart">
                        <path stroke="none" d="M0 0h24v24H0z" fill="none" />
                        <path
                            d="M6 2a1 1 0 0 1 .993 .883l.007 .117v1.068l13.071 .935a1 1 0 0 1 .929 1.024l-.01 .114l-1 7a1 1 0 0 1 -.877 .853l-.113 .006h-12v2h10a3 3 0 1 1 -2.995 3.176l-.005 -.176l.005 -.176c.017 -.288 .074 -.564 .166 -.824h-5.342a3 3 0 1 1 -5.824 1.176l-.005 -.176l.005 -.176a3.002 3.002 0 0 1 1.995 -2.654v-12.17h-1a1 1 0 0 1 -.993 -.883l-.007 -.117a1 1 0 0 1 .883 -.993l.117 -.007h2zm0 16a1 1 0 1 0 0 2a1 1 0 0 0 0 -2m11 0a1 1 0 1 0 0 2a1 1 0 0 0 0 -2" />
                    </svg>
                </button>
                <button class="btn2">JOIN NOW</button>
            </div>
        </div>
        <div class="hero-section">
            <section>
                <h1>RISE ABOVE THE REST</h1>
                <p>
                    Engineered for high-performance humans. We provide the tools. the technology. and the intensity
                    required
                    to
                    shatter plateaus.
                </p>
                <div class="hero-section-footer">
                    <button class="btn1">JOIN NOW</button>
                    <button class="btn2">VIEW PROGRAMS</button>
                </div>
            </section>
        </div>
        <div class="flex-section-3">
            <div class="content">
                <div>
                    <h3>50+</h3>
                    <p>ELITE COACHES</p>
                </div>
                <div class="vr"></div>
            </div>
            <div class="content">
                <div>
                    <h3>24/7</h3>
                    <p>ACCESS</p>
                </div>
                <div class="vr"></div>
            </div>
            <div class="content">
                <div>
                    <h3>12k SQ FT</h3>
                    <p>FLOOR SPACE</p>
                </div>
            </div>
        </div>
    </div>

    <script>
        const toggleNav = document.querySelector('.toggle-nav');
        const header = document.querySelector('.header');
        const toggleClose = document.getElementById('toggle-close');

        toggleNav.addEventListener('click', () => {
            header.style.display = 'flex';
        });

        toggleClose.addEventListener('click', () => {
            header.style.display = 'none';
        });
    </script>
</body>

</html>
